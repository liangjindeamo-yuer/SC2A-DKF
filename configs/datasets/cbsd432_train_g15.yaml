dataset:
  target: idf.datasets.gaussian.GaussianDataset
  params:
    dataroot: data/CBSD432
    noise_level: [15, 15]
    channel_wise_noise: false
    patch_size: 128
    augmentation: true
    test: false
    preload: false
    parallel_preload: false

data_loader:
  batch_size: 4
  shuffle: true
  num_workers: 0
  drop_last: true

repeat_dataset:
  times: 10000

batch_transform:
  target: idf.datasets.batch_transform.IdentityBatchTransform

